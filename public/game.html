<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #placeholder {
      color: #888;
      text-align: center;
      font-size: 18px;
      line-height: 2;
    }
    #placeholder .big { font-size: 48px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="placeholder">
    <div class="big">🎮</div>
    <div>Your game will appear here!</div>
    <div style="font-size:14px; color:#666; margin-top:8px">Describe a game and press Make My Game →</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script>
    let game = null;
    let currentConfig = null;

    // ── Shared Phaser Game options ────────────────────────────────────────────
    function makePhaserConfig(bgColor, sceneClass) {
      return {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: bgColor || '#1a1a2e',
        scene: [sceneClass],
        parent: document.body,
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        audio: { disableWebAudio: true },
      };
    }

    // ── Procedural Web Audio sounds ───────────────────────────────────────────
    // Our own AudioContext — completely separate from Phaser's audio system.
    function createSounds() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        function tone(freq, dur, type, vol) {
          type = type || 'sine'; vol = vol || 0.22;
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = type;
          o.frequency.value = freq;
          g.gain.setValueAtTime(vol, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
          o.connect(g); g.connect(ctx.destination);
          o.start(); o.stop(ctx.currentTime + dur);
        }
        return {
          // Rising chirp: short + crisp
          jump()     { tone(300, 0.04); setTimeout(function(){ tone(520, 0.07); }, 40); },
          // Soft thud on landing
          land()     { tone(130, 0.07, 'triangle', 0.16); },
          // Sad descending tones
          gameOver() {
            [400, 300, 180].forEach(function(f, i) {
              setTimeout(function(){ tone(f, 0.14, 'sawtooth', 0.14); }, i * 130);
            });
          },
          // Coin-style ding
          score()    { tone(523, 0.05); setTimeout(function(){ tone(784, 0.09); }, 60); },
          // Shooter: pop + snap
          shoot()    { tone(900, 0.03, 'square', 0.1); setTimeout(function(){ tone(500, 0.05, 'square', 0.08); }, 25); },
          // Shooter: low thud on hit
          hit()      { tone(180, 0.12, 'sawtooth', 0.18); },
        };
      } catch (e) {
        // Web Audio unavailable — return no-op object
        return { jump: function(){}, land: function(){}, gameOver: function(){}, score: function(){}, shoot: function(){}, hit: function(){} };
      }
    }

    // ── Action System ─────────────────────────────────────────────────────────
    // Interprets config.actions[] at runtime. Both scenes call init/tick/handleCollision/destroy.
    var ActionSystem = {
      state: {},

      init: function(scene) {
        var st = {};
        var actions = (currentConfig && currentConfig.actions) || [];
        actions.forEach(function(a) {
          if (a.type === 'lives') {
            st.lives = (a.params && a.params.count) || 3;
            st.maxLives = st.lives;
            st.isInvincible = false;
            st.livesObjs = [];
          }
          if (a.type === 'collectible') {
            st.collectibles = [];
            st.collectibleTimer = 0;
          }
          if (a.type === 'shield') {
            st.shieldActive = false;
            st.shieldTimer = 0;
            st.shieldItem = null;
            st.shieldBubble = null;
          }
          if (a.type === 'double-points') {
            st.doubleActive = false;
            st.doubleCooldown = 0;
            st.doubleBanner = null;
          }
          if (a.type === 'speed-ramp') {
            st.speedRampTimer = 0;
            st.currentSpeed = (currentConfig && currentConfig.speed) || 250;
          }
        });
        ActionSystem.state = st;
        var livesAction = actions.find(function(a){ return a.type === 'lives'; });
        if (livesAction) ActionSystem.buildLivesHUD(scene);
      },

      buildLivesHUD: function(scene) {
        var st = ActionSystem.state;
        st.livesObjs = [];
        for (var i = 0; i < st.maxLives; i++) {
          var h = scene.add.text(16 + i * 28, 48, '❤️', {
            fontSize: '20px', fontFamily: 'Arial'
          }).setDepth(30);
          st.livesObjs.push(h);
        }
      },

      updateLivesHUD: function() {
        var st = ActionSystem.state;
        if (st.livesObjs) {
          st.livesObjs.forEach(function(h, i) {
            h.setAlpha(i < st.lives ? 1 : 0.18);
          });
        }
      },

      // Returns effective speed for this frame (may be increased by speed-ramp)
      tick: function(scene, time, delta, dt, heroX, heroY) {
        var actions = (currentConfig && currentConfig.actions) || [];
        var st = ActionSystem.state;
        var speed = (st.currentSpeed !== undefined) ? st.currentSpeed : ((currentConfig && currentConfig.speed) || 250);
        var isTopDown = currentConfig && currentConfig.template === 'topdown';

        actions.forEach(function(a) {

          // ── Collectible ──────────────────────────────────────────────────────
          if (a.type === 'collectible' && st.collectibles !== undefined) {
            var interval = (a.params && a.params.spawnInterval) || 4000;
            st.collectibleTimer += delta;
            if (st.collectibleTimer >= interval) {
              st.collectibleTimer = 0;
              ActionSystem.spawnCollectible(scene, a);
            }
            for (var i = st.collectibles.length - 1; i >= 0; i--) {
              var c = st.collectibles[i];
              if (!isTopDown) c.x -= speed * dt; // runner: scroll left
              c.obj.setPosition(c.x, c.y);
              var hit = Math.abs(c.x - heroX) < 32 && Math.abs(c.y - heroY) < 32;
              if (hit) {
                c.obj.destroy();
                st.collectibles.splice(i, 1);
                var pts = (a.params && a.params.points) || 5;
                if (st.doubleActive) pts *= 2;
                scene.score += pts;
                if (scene.scoreTxt) {
                  scene.scoreTxt.setText(isTopDown
                    ? 'Score: ' + scene.score
                    : 'Score: ' + scene.score);
                }
                scene.sounds && scene.sounds.score();
              } else if (!isTopDown && c.x < -80) {
                c.obj.destroy();
                st.collectibles.splice(i, 1);
              }
            }
          }

          // ── Shield ───────────────────────────────────────────────────────────
          if (a.type === 'shield') {
            var shieldInt = (a.params && a.params.shieldInterval) || 15000;
            if (!st.shieldActive && !st.shieldItem) {
              st.shieldTimer += delta;
              if (st.shieldTimer >= shieldInt) {
                st.shieldTimer = 0;
                ActionSystem.spawnShield(scene);
              }
            }
            if (st.shieldItem) {
              if (!isTopDown) st.shieldItem.x -= speed * dt;
              st.shieldItem.obj.setPosition(st.shieldItem.x, st.shieldItem.y);
              var shHit = Math.abs(st.shieldItem.x - heroX) < 38 && Math.abs(st.shieldItem.y - heroY) < 38;
              if (shHit) {
                st.shieldItem.obj.destroy(); st.shieldItem = null;
                st.shieldActive = true;
                if (st.shieldBubble) st.shieldBubble.destroy();
                st.shieldBubble = scene.add.circle(heroX, heroY, 38, 0x44aaff, 0.28).setDepth(25);
                scene.sounds && scene.sounds.score();
                var dur = (a.params && a.params.duration) || 5000;
                scene.time.delayedCall(dur, function() {
                  st.shieldActive = false;
                  if (st.shieldBubble) { st.shieldBubble.destroy(); st.shieldBubble = null; }
                });
              } else if (!isTopDown && st.shieldItem.x < -80) {
                st.shieldItem.obj.destroy(); st.shieldItem = null;
              }
            }
            // Keep shield bubble on hero
            if (st.shieldBubble) st.shieldBubble.setPosition(heroX, heroY);
          }

          // ── Double-points ────────────────────────────────────────────────────
          if (a.type === 'double-points') {
            var doubleInt = (a.params && a.params.doubleInterval) || 20000;
            var doubleDur = (a.params && a.params.doubleDuration) || 5000;
            if (!st.doubleActive) {
              st.doubleCooldown += delta;
              if (st.doubleCooldown >= doubleInt) {
                st.doubleCooldown = 0;
                st.doubleActive = true;
                if (st.doubleBanner) st.doubleBanner.destroy();
                var W2 = window.innerWidth;
                st.doubleBanner = scene.add.text(W2 / 2, 80, '⚡ 2× Points!', {
                  fontSize: '22px', fontFamily: 'Arial',
                  color: '#ffe000', stroke: '#000', strokeThickness: 3,
                }).setOrigin(0.5).setDepth(28);
                scene.time.delayedCall(doubleDur, function() {
                  st.doubleActive = false;
                  if (st.doubleBanner) { st.doubleBanner.destroy(); st.doubleBanner = null; }
                });
              }
            }
          }

          // ── Speed-ramp ───────────────────────────────────────────────────────
          if (a.type === 'speed-ramp') {
            st.speedRampTimer += delta;
            if (st.speedRampTimer >= 10000) {
              st.speedRampTimer = 0;
              var inc = (a.params && a.params.increment) || 30;
              var maxSpd = (a.params && a.params.maxSpeed) || 600;
              st.currentSpeed = Math.min(maxSpd, (st.currentSpeed || (currentConfig && currentConfig.speed) || 250) + inc);
            }
            speed = st.currentSpeed;
          }
        });

        return speed;
      },

      spawnCollectible: function(scene, action) {
        var W = window.innerWidth, H = window.innerHeight;
        var GROUND_Y = Math.floor(H * 0.78);
        var emoji = (action.params && action.params.spawnEmoji) || '⭐';
        var x, y;
        if (currentConfig && currentConfig.template === 'topdown') {
          // Spawn at random position on screen (not near edges)
          x = Phaser.Math.Between(60, W - 60);
          y = Phaser.Math.Between(60, H - 60);
        } else {
          // Runner: spawn from right edge at ground level
          x = W + 40;
          y = GROUND_Y - 28;
        }
        var obj = scene.add.text(x, y, emoji, { fontSize: '32px', fontFamily: 'Arial' }).setOrigin(0.5).setDepth(10);
        ActionSystem.state.collectibles.push({ x: x, y: y, obj: obj });
      },

      spawnShield: function(scene) {
        var W = window.innerWidth, H = window.innerHeight;
        var GROUND_Y = Math.floor(H * 0.78);
        var x, y;
        if (currentConfig && currentConfig.template === 'topdown') {
          x = Phaser.Math.Between(60, W - 60);
          y = Phaser.Math.Between(60, H - 60);
        } else {
          x = W + 40;
          y = GROUND_Y - 28;
        }
        var obj = scene.add.text(x, y, '🛡️', { fontSize: '32px', fontFamily: 'Arial' }).setOrigin(0.5).setDepth(10);
        ActionSystem.state.shieldItem = { x: x, y: y, obj: obj };
      },

      // Call on collision. Returns true = game over, false = collision absorbed.
      handleCollision: function(scene, hitEnemyObj) {
        var actions = (currentConfig && currentConfig.actions) || [];
        var st = ActionSystem.state;

        // Enemy-explode visual (flash the enemy object if provided)
        var hasExplode = actions.some(function(a){ return a.type === 'enemy-explode'; });
        if (hasExplode && hitEnemyObj && scene.tweens) {
          scene.tweens.add({
            targets: hitEnemyObj,
            alpha: 0, scaleX: 1.8, scaleY: 1.8,
            duration: 250, ease: 'Power2',
            onComplete: function(){ if(hitEnemyObj.active) hitEnemyObj.destroy(); }
          });
        }

        // Shield absorbs the hit
        if (st.shieldActive) {
          st.shieldActive = false;
          if (st.shieldBubble) { st.shieldBubble.destroy(); st.shieldBubble = null; }
          scene.sounds && scene.sounds.score();
          return false;
        }

        // Lives system: deduct a life
        var livesAction = actions.find(function(a){ return a.type === 'lives'; });
        if (livesAction && st.lives !== undefined) {
          if (st.isInvincible) return false;
          st.lives = Math.max(0, st.lives - 1);
          ActionSystem.updateLivesHUD();
          if (st.lives <= 0) return true; // game over
          // Brief invincibility + hero flash
          st.isInvincible = true;
          var hero = scene.hero || scene.heroObj;
          if (hero && scene.tweens) {
            scene.tweens.add({
              targets: hero, alpha: 0.2, duration: 100,
              yoyo: true, repeat: 6,
              onComplete: function(){ if(hero.active) hero.setAlpha(1); }
            });
          }
          scene.time.delayedCall(1500, function(){ st.isInvincible = false; });
          scene.sounds && scene.sounds.land && scene.sounds.land();
          return false;
        }

        return true; // default: game over
      },

      destroy: function() {
        var st = ActionSystem.state;
        if (st.collectibles) st.collectibles.forEach(function(c){ if(c.obj.active) c.obj.destroy(); });
        if (st.shieldItem && st.shieldItem.obj.active) st.shieldItem.obj.destroy();
        if (st.shieldBubble && st.shieldBubble.active) st.shieldBubble.destroy();
        if (st.doubleBanner && st.doubleBanner.active) st.doubleBanner.destroy();
        if (st.livesObjs) st.livesObjs.forEach(function(h){ if(h.active) h.destroy(); });
        ActionSystem.state = {};
      },
    };

    // ── Dispatch on template ──────────────────────────────────────────────────
    function startGame(config) {
      currentConfig = config;

      // Hide placeholder
      var placeholder = document.getElementById('placeholder');
      if (placeholder) placeholder.style.display = 'none';

      // Destroy existing game
      if (game) { game.destroy(true); game = null; }

      if (config.template === 'topdown') {
        startTopDownGame(config);
      } else if (config.template === 'shooter') {
        startShooterGame(config);
      } else {
        startRunnerGame(config);
      }
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  RUNNER TEMPLATE (side-scroller — hero jumps over enemies)
    // ══════════════════════════════════════════════════════════════════════════
    function startRunnerGame(config) {
      var W = window.innerWidth;
      var H = window.innerHeight;
      var GROUND_Y = H * 0.78;
      var GROUND_HEIGHT = H - GROUND_Y;

      class RunnerScene extends Phaser.Scene {
        constructor() { super({ key: 'RunnerScene' }); }

        // ── Preload sprites when catalog IDs are set ──────────────────────────
        preload() {
          if (config.heroSpriteUrl)  this.load.image('hero-spr',  config.heroSpriteUrl);
          else if (config.heroSpriteId)  this.load.image('hero-spr',  '/assets/characters/' + config.heroSpriteId  + '.svg');
          if (config.enemySpriteUrl) this.load.image('enemy-spr', config.enemySpriteUrl);
          else if (config.enemySpriteId) this.load.image('enemy-spr', '/assets/characters/' + config.enemySpriteId + '.svg');
          if (config.bgUrl)          this.load.image('bg-tile',   config.bgUrl);
          else if (config.bgId)          this.load.image('bg-tile',   '/assets/backgrounds/' + config.bgId         + '.svg');
        }

        create() {
          this.gameOver = false;
          this.score = 0;
          this.spawnTimer = 0;
          this.spawnInterval = 2200;
          this.lastTime = 0;
          this.sounds = createSounds();
          ActionSystem.init(this);

          // ── Background ───────────────────────────────────────────────────────
          var hasBgTile = config.bgId && this.textures.exists('bg-tile');
          if (hasBgTile) {
            this.bgTile = this.add.tileSprite(0, 0, W, H, 'bg-tile').setOrigin(0).setDepth(-2);
          } else {
            this.cameras.main.setBackgroundColor(config.backgroundColor || '#87CEEB');
          }

          // Clouds (decorative — shown even with bg tiles for parallax feel)
          this.clouds = [];
          for (var i = 0; i < 4; i++) {
            var cloud = this.add.text(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(30, GROUND_Y * 0.4),
              '☁️',
              { fontSize: Phaser.Math.Between(28, 52) + 'px' }
            ).setDepth(-1);
            cloud.speed = Phaser.Math.Between(20, 50);
            this.clouds.push(cloud);
          }

          // Ground
          this.add.rectangle(W / 2, GROUND_Y + GROUND_HEIGHT / 2, W, GROUND_HEIGHT, 0x5a8a5a);
          this.add.rectangle(W / 2, GROUND_Y + 2, W, 4, 0x3d6b3d);

          // ── Hero (sprite or emoji) ────────────────────────────────────────────
          var useHeroSpr = config.heroSpriteId && this.textures.exists('hero-spr');
          if (useHeroSpr) {
            this.hero = this.add.image(120, GROUND_Y - 16, 'hero-spr')
              .setDisplaySize(52, 52).setOrigin(0.5, 1);
          } else {
            this.hero = this.add.text(120, GROUND_Y - 10, config.heroEmoji, {
              fontSize: '52px', fontFamily: 'Arial'
            }).setOrigin(0.5, 1);
          }
          this.useHeroSpr = useHeroSpr;

          this.heroVelocityY = 0;
          this.isJumping = false;
          this.wasJumping = false;
          this.isDucking = false;
          this.jumpForce = config.jumpForce || 580;
          this.gravity = 1400;
          this.enemies = [];
          this.lastArrivalTime = 0;  // arrival-gate: tracks predicted arrival of last spawned enemy
          this.useEnemySpr = config.enemySpriteId && this.textures.exists('enemy-spr');

          // Score + title text
          this.scoreTxt = this.add.text(W - 20, 20, 'Score: 0', {
            fontSize: '24px', color: '#fff', stroke: '#000', strokeThickness: 4,
          }).setOrigin(1, 0);

          this.add.text(20, 20, config.title || 'Game!', {
            fontSize: '22px', color: '#fff', stroke: '#000', strokeThickness: 4,
          });

          // Input — keyboard
          this.input.keyboard.on('keydown-SPACE', () => this.doJump());
          this.input.keyboard.on('keydown-UP',    () => this.doJump());
          this.input.keyboard.on('keydown-DOWN',  () => this.startDuck());
          this.input.keyboard.on('keyup-DOWN',    () => this.stopDuck());

          // Input — pointer: top half = jump, bottom half = duck (split-screen)
          var self = this;
          this.input.on('pointerdown', function(ptr) {
            if (self.gameOver) { self.scene.restart(); return; }
            if (ptr.y < H / 2) self.doJump();
            else                self.startDuck();
          });
          this.input.on('pointerup', function() { self.stopDuck(); });

          // Start hint
          this.startMsg = this.add.text(W / 2, GROUND_Y * 0.5, '⬆ SPACE / tap top to jump  ⬇ DOWN / tap bottom to duck', {
            fontSize: '28px', color: '#fff', stroke: '#000', strokeThickness: 5,
            backgroundColor: '#0008', padding: { x: 16, y: 8 },
          }).setOrigin(0.5).setDepth(10);
          this.time.delayedCall(2000, () => {
            if (this.startMsg) this.startMsg.setAlpha(0);
          });

          // Signal to parent page that the game started successfully
          window.parent.postMessage({ type: 'GAME_READY' }, '*');
        }

        doJump() {
          if (this.gameOver) { this.scene.restart(); return; }
          if (this.isDucking) return; // can't jump while ducking
          if (!this.isJumping) {
            this.heroVelocityY = -(this.jumpForce);
            this.isJumping = true;
            this.sounds.jump();
          }
        }

        startDuck() {
          if (this.isDucking || this.isJumping) return; // can't duck mid-air
          this.isDucking = true;
          this.hero.setScale(1, 0.5);
        }

        stopDuck() {
          if (!this.isDucking) return;
          this.isDucking = false;
          this.hero.setScale(1, 1);
        }

        spawnOneEnemy(speed) {
          var groundY = GROUND_Y;
          var diff = (currentConfig && currentConfig.difficulty) || {};

          // Determine actual speed first (needed for arrival prediction)
          var fastChance  = diff.fastEnemyChance != null ? diff.fastEnemyChance : 0.15;
          var speedMult   = Math.random() < fastChance ? 1.5 : 1.0;
          var actualSpeed = speed * speedMult + Phaser.Math.Between(0, 15); // ±15 jitter keeps feel "alive"

          // Arrival gate: ensure player ALWAYS has time to jump before next enemy arrives.
          // Jump time = 2 × jumpForce / gravity = 2 × 580 / 1400 ≈ 0.83s.
          // MIN_GAP = 950ms guarantees a full jump + 120ms buffer between any two arrivals.
          var travelMs       = ((W + 40 - 120) / actualSpeed) * 1000; // time from spawn to hero x
          var predictedArrival = this.time.now + travelMs;
          if (predictedArrival - this.lastArrivalTime < 950) return; // skip — would be undodgeable
          this.lastArrivalTime = predictedArrival;

          // Roll for low obstacle (duck-required, floats at head height) vs normal (jump-required)
          var lowChance = diff.lowObstacleChance != null ? diff.lowObstacleChance : 0;
          var isLow     = Math.random() < lowChance;

          var enemy;
          if (!isLow && this.useEnemySpr) {
            enemy = this.add.image(W + 40, groundY - 16, 'enemy-spr')
              .setDisplaySize(48, 48).setOrigin(0.5, 1);
          } else {
            // Low obstacles spawn at head-height (55px above ground) so they clearly float overhead.
            // Default '🔥' looks like a floating hazard — AI overrides with themed emoji.
            var obstacleEmoji = isLow ? (diff.lowObstacleEmoji || '🔥') : config.enemyEmoji;
            var obstacleY     = isLow ? (groundY - 55) : (groundY - 10);
            enemy = this.add.text(W + 40, obstacleY, obstacleEmoji, {
              fontSize: '48px', fontFamily: 'Arial'
            }).setOrigin(0.5, 1);
          }
          enemy.isLow = isLow; // tag for custom hitbox in collision loop
          enemy.velocityX = -actualSpeed;
          this.enemies.push(enemy);
        }

        update(time, delta) {
          if (this.gameOver) return;
          var dt = delta / 1000;
          var groundY = GROUND_Y;
          var speed = ActionSystem.tick(this, time, delta, dt, this.hero.x, this.hero.y);

          // Scroll background tile (parallax)
          if (this.bgTile) this.bgTile.tilePositionX += speed * 0.3 * dt;

          // Clouds
          this.clouds.forEach(function(c) { c.x -= c.speed * dt; if (c.x < -80) c.x = W + 80; });

          // Hero physics
          this.wasJumping = this.isJumping;
          this.heroVelocityY += this.gravity * dt;
          this.hero.y += this.heroVelocityY * dt;
          if (this.hero.y >= groundY - 10) {
            this.hero.y = groundY - 10;
            this.heroVelocityY = 0;
            if (this.wasJumping) this.sounds.land();
            this.isJumping = false;
          }

          // Spawn enemies — progressive difficulty
          this.spawnTimer += delta;
          if (this.spawnTimer >= this.spawnInterval) {
            this.spawnTimer = 0;
            // Interval shrinks over time; jitter ±25% breaks metronomic rhythm
            var diff = (currentConfig && currentConfig.difficulty) || {};
            var spawnDecay = diff.spawnDecay != null ? diff.spawnDecay : 8;   // ms/sec
            var spawnMin   = diff.spawnMin   != null ? diff.spawnMin   : 900;  // floor ms
            var spawnBase  = Math.max(spawnMin, 2200 - (time / 1000) * spawnDecay);
            this.spawnInterval = Phaser.Math.Between(spawnBase * 0.75, spawnBase * 1.25);
            // Baked-in speed ramp — always active, no config needed.
            // +20px/s per 30 seconds, capped at +200px/s (~4.5× the default start speed).
            var bakedRamp = Math.min(200, Math.floor(time / 30000) * 20);
            var spawnSpeed = Math.min(600, speed + bakedRamp);
            this.spawnOneEnemy(spawnSpeed);
            // Burst: occasional quick follow-up enemy breaks the rhythm further
            var burstChance = diff.burstChance != null ? diff.burstChance : 0.2;
            if (Math.random() < burstChance) {
              var self = this;
              this.time.delayedCall(Phaser.Math.Between(350, 600), function() {
                if (!self.gameOver) self.spawnOneEnemy(spawnSpeed);
              });
            }
          }

          // Move enemies + collision
          var heroBox = this.isDucking
            ? { x: this.hero.x - 20, y: this.hero.y - 22, w: 40, h: 22 }
            : { x: this.hero.x - 18, y: this.hero.y - 44, w: 36, h: 44 };
          for (var i = this.enemies.length - 1; i >= 0; i--) {
            var e = this.enemies[i];
            e.x += e.velocityX * dt;
            if (e.x < -60) {
              e.destroy(); this.enemies.splice(i, 1);
              this.score++;
              this.scoreTxt.setText('Score: ' + this.score);
              if (this.score % 10 === 0) this.sounds.score();
              continue;
            }
            // Low obstacles use a fixed-world-Y hitbox at head height.
            // eBox.bottom = GROUND_Y-44: standing hero top (GROUND_Y-54) hits it;
            // ducking hero top (GROUND_Y-32) clears it. Normal enemies use e.y-relative box.
            var eBox = e.isLow
              ? { x: e.x - 22, y: GROUND_Y - 70, w: 44, h: 26 }  // bottom = GROUND_Y-44
              : { x: e.x - 16, y: e.y - 40, w: 32, h: 40 };
            if (heroBox.x < eBox.x + eBox.w && heroBox.x + heroBox.w > eBox.x &&
                heroBox.y < eBox.y + eBox.h && heroBox.y + heroBox.h > eBox.y) {
              if (ActionSystem.handleCollision(this, e)) { this.triggerGameOver(); return; }
            }
          }
        }

        triggerGameOver() {
          this.gameOver = true;
          ActionSystem.destroy();
          this.sounds.gameOver();
          if (this.useHeroSpr) {
            // Tint the sprite red on game over
            this.hero.setTint(0xff4444);
          } else {
            this.hero.setText('💥');
          }
          var W2 = window.innerWidth, H2 = window.innerHeight;
          this.add.rectangle(W2 / 2, H2 / 2, 360, 200, 0x000000, 0.75).setDepth(20);
          this.add.text(W2 / 2, H2 / 2 - 50, '💀 Game Over!', {
            fontSize: '36px', color: '#ff4444', stroke: '#000', strokeThickness: 4,
          }).setOrigin(0.5).setDepth(21);
          this.add.text(W2 / 2, H2 / 2, 'Score: ' + this.score, {
            fontSize: '28px', color: '#fff',
          }).setOrigin(0.5).setDepth(21);
          this.add.text(W2 / 2, H2 / 2 + 48, 'Tap or SPACE to play again!', {
            fontSize: '18px', color: '#aaa',
          }).setOrigin(0.5).setDepth(21);
        }
      }

      game = new Phaser.Game(makePhaserConfig(config.backgroundColor || '#87CEEB', RunnerScene));
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  TOP-DOWN TEMPLATE (4-direction — hero dodges enemies from above)
    // ══════════════════════════════════════════════════════════════════════════
    function startTopDownGame(config) {
      class TopDownScene extends Phaser.Scene {
        constructor() { super({ key: 'TopDownScene' }); }

        // ── Preload sprites when catalog IDs are set ──────────────────────────
        preload() {
          if (config.heroSpriteUrl)  this.load.image('hero-spr',  config.heroSpriteUrl);
          else if (config.heroSpriteId)  this.load.image('hero-spr',  '/assets/characters/' + config.heroSpriteId  + '.svg');
          if (config.enemySpriteUrl) this.load.image('enemy-spr', config.enemySpriteUrl);
          else if (config.enemySpriteId) this.load.image('enemy-spr', '/assets/characters/' + config.enemySpriteId + '.svg');
          if (config.bgUrl)          this.load.image('bg-tile',   config.bgUrl);
          else if (config.bgId)          this.load.image('bg-tile',   '/assets/backgrounds/' + config.bgId         + '.svg');
        }

        create() {
          var W = this.cameras.main.width;
          var H = this.cameras.main.height;

          this.W = W; this.H = H;
          this.heroX = W / 2;
          this.heroY = H / 2;
          this.enemies = [];       // {x, y, obj}
          this.score = 0;
          this.isGameOver = false;
          this.lastSpawn = 0;
          this.pointerTarget = null; // {x, y} for touch movement
          this.sounds = createSounds();
          ActionSystem.init(this);

          // ── Background ───────────────────────────────────────────────────────
          if (config.bgId && this.textures.exists('bg-tile')) {
            this.add.tileSprite(W / 2, H / 2, W, H, 'bg-tile').setOrigin(0.5).setDepth(-2);
          }

          // Arena border (semi-transparent overlay so it shows above any bg tile)
          this.add.rectangle(W / 2, H / 2, W - 8, H - 8, 0xffffff, 0)
            .setStrokeStyle(3, 0xffffff, 0.35).setDepth(0);

          // ── Hero (sprite or emoji) ────────────────────────────────────────────
          var useHeroSpr = config.heroSpriteId && this.textures.exists('hero-spr');
          if (useHeroSpr) {
            this.heroObj = this.add.image(this.heroX, this.heroY, 'hero-spr')
              .setDisplaySize(52, 52).setOrigin(0.5).setDepth(2);
          } else {
            this.heroObj = this.add.text(this.heroX, this.heroY, config.heroEmoji, {
              fontSize: '52px', fontFamily: 'Arial'
            }).setOrigin(0.5).setDepth(2);
          }
          this.useHeroSpr = useHeroSpr;
          this.useEnemySpr = config.enemySpriteId && this.textures.exists('enemy-spr');

          // Score + title
          var hasCollectibleInit = (config.actions || []).some(function(a){ return a.type === 'collectible'; });
          this.scoreTxt = this.add.text(W - 20, 20, hasCollectibleInit ? 'Score: 0' : 'Time: 0s', {
            fontSize: '24px', color: '#fff', stroke: '#000', strokeThickness: 4,
          }).setOrigin(1, 0).setDepth(5);

          this.add.text(20, 20, config.title || 'Game!', {
            fontSize: '22px', color: '#fff', stroke: '#000', strokeThickness: 4,
          }).setDepth(5);

          // Keyboard
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys('W,A,S,D');

          // Touch/pointer: hold to move toward pointer
          this.input.on('pointerdown', (ptr) => { this.pointerTarget = { x: ptr.x, y: ptr.y }; });
          this.input.on('pointermove', (ptr) => {
            if (ptr.isDown) this.pointerTarget = { x: ptr.x, y: ptr.y };
          });
          this.input.on('pointerup', () => { this.pointerTarget = null; });

          // Start hint
          var hint = this.add.text(W / 2, H * 0.88, 'Arrow keys / WASD or tap to move!', {
            fontSize: '22px', color: '#fff', stroke: '#000', strokeThickness: 4,
            backgroundColor: '#0008', padding: { x: 14, y: 6 },
          }).setOrigin(0.5).setDepth(10);
          this.time.delayedCall(2500, () => { if (hint) hint.setAlpha(0); });

          // Signal to parent page that the game started successfully
          window.parent.postMessage({ type: 'GAME_READY' }, '*');
        }

        update(time, delta) {
          if (this.isGameOver) return;
          var dt = delta / 1000;
          var speed = ActionSystem.tick(this, time, delta, dt, this.heroX, this.heroY);
          var W = this.W, H = this.H;

          // ── Hero movement ─────────────────────────────────────────────────────
          var vx = 0, vy = 0;

          if (this.cursors.left.isDown  || this.wasd.A.isDown) vx = -1;
          if (this.cursors.right.isDown || this.wasd.D.isDown) vx =  1;
          if (this.cursors.up.isDown    || this.wasd.W.isDown) vy = -1;
          if (this.cursors.down.isDown  || this.wasd.S.isDown) vy =  1;

          // Touch: move toward held pointer point
          if (vx === 0 && vy === 0 && this.pointerTarget) {
            var dx = this.pointerTarget.x - this.heroX;
            var dy = this.pointerTarget.y - this.heroY;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 8) { vx = dx / dist; vy = dy / dist; }
          }

          // Normalize diagonal keyboard input
          if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }

          this.heroX = Math.max(32, Math.min(W - 32, this.heroX + vx * speed * dt));
          this.heroY = Math.max(32, Math.min(H - 32, this.heroY + vy * speed * dt));
          this.heroObj.setPosition(this.heroX, this.heroY);

          // ── Spawn enemies — progressive difficulty ────────────────────────────
          var elapsed = Math.floor(time / 1000);
          var tdDiff    = (currentConfig && currentConfig.difficulty) || {};
          var tdDecay   = tdDiff.spawnDecay != null ? tdDiff.spawnDecay : 12;  // ms/sec (default 12 → peak at ~2.2 min)
          var tdMin     = tdDiff.spawnMin   != null ? tdDiff.spawnMin   : 600;
          var spawnInterval = Math.max(tdMin, 2200 - elapsed * tdDecay);
          if (time - this.lastSpawn > spawnInterval) {
            this.spawnEnemy(); this.lastSpawn = time;
          }

          // ── Move enemies + collision ──────────────────────────────────────────
          for (var i = this.enemies.length - 1; i >= 0; i--) {
            var e = this.enemies[i];
            var ex = this.heroX - e.x;
            var ey = this.heroY - e.y;
            var edist = Math.sqrt(ex * ex + ey * ey);

            if (edist < 34) {
              if (ActionSystem.handleCollision(this, e.obj)) { this.triggerGameOver(); return; }
            }

            if (edist > 0) {
              e.x += (ex / edist) * speed * 0.7 * dt;
              e.y += (ey / edist) * speed * 0.7 * dt;
              e.obj.setPosition(e.x, e.y);
            }
          }

          // ── Score (time survived + any collectible bonus) ─────────────────────
          var hasCollectible = (config.actions || []).some(function(a){ return a.type === 'collectible'; });
          if (!hasCollectible) this.score = elapsed;
          this.scoreTxt.setText(hasCollectible ? 'Score: ' + this.score : 'Time: ' + elapsed + 's');
          // Ding every 5 seconds
          if (elapsed > 0 && elapsed % 5 === 0 && elapsed !== this.lastScoreSnd) {
            this.lastScoreSnd = elapsed;
            this.sounds.score();
          }
        }

        spawnEnemy() {
          var W = this.W, H = this.H;
          var x, y;
          var side = Phaser.Math.Between(0, 3);
          if (side === 0)      { x = Phaser.Math.Between(0, W); y = -40; }
          else if (side === 1) { x = W + 40; y = Phaser.Math.Between(0, H); }
          else if (side === 2) { x = Phaser.Math.Between(0, W); y = H + 40; }
          else                 { x = -40; y = Phaser.Math.Between(0, H); }

          var obj;
          if (this.useEnemySpr) {
            obj = this.add.image(x, y, 'enemy-spr').setDisplaySize(44, 44).setOrigin(0.5).setDepth(2);
          } else {
            obj = this.add.text(x, y, config.enemyEmoji, {
              fontSize: '44px', fontFamily: 'Arial'
            }).setOrigin(0.5).setDepth(2);
          }
          this.enemies.push({ x, y, obj });
        }

        triggerGameOver() {
          this.isGameOver = true;
          ActionSystem.destroy();
          this.sounds.gameOver();
          if (this.useHeroSpr) {
            this.heroObj.setTint(0xff4444);
          } else {
            this.heroObj.setText('💥');
          }

          var W = this.W, H = this.H;
          var cx = W / 2, cy = H / 2;

          this.add.rectangle(cx, cy, 380, 210, 0x000000, 0.78).setDepth(20);
          this.add.text(cx, cy - 58, '💀 Game Over!', {
            fontSize: '36px', color: '#ff4444', stroke: '#000', strokeThickness: 4,
          }).setOrigin(0.5).setDepth(21);
          var hasCollectGO = (config.actions || []).some(function(a){ return a.type === 'collectible'; });
          this.add.text(cx, cy - 8, hasCollectGO ? 'Score: ' + this.score : 'Survived: ' + this.score + 's', {
            fontSize: '28px', color: '#fff',
          }).setOrigin(0.5).setDepth(21);
          this.add.text(cx, cy + 42, 'Tap or SPACE to play again!', {
            fontSize: '18px', color: '#aaa',
          }).setOrigin(0.5).setDepth(21);

          this.input.keyboard.once('keydown', () => this.scene.restart());
          this.input.once('pointerdown', () => this.scene.restart());
        }
      }

      game = new Phaser.Game(makePhaserConfig(config.backgroundColor || '#1a1a2e', TopDownScene));
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  SHOOTER TEMPLATE (top-down paintball — player shoots enemies, AI shoots back)
    // ══════════════════════════════════════════════════════════════════════════
    function startShooterGame(config) {
      var SC             = config.shooter || {};
      var WALL_COUNT     = Math.max(2,   Math.min(16,   SC.wallCount        || 6));
      var HERO_HP        = Math.max(1,   Math.min(5,    SC.heroHp           || 3));
      var ENEMY_HP       = Math.max(1,   Math.min(4,    SC.enemyHp          || 2));
      var FIRE_RATE      = Math.max(200, Math.min(1200, SC.fireRate         || 500));
      var ENEMY_FR_BASE  = Math.max(800, Math.min(4000, SC.enemyFireRate    || 2000));
      var MAX_ENEMIES    = Math.max(2,   Math.min(8,    SC.maxEnemies       || 4));
      var PROJ_SPEED     = Math.max(200, Math.min(700,  SC.projectileSpeed  || 450));
      var HERO_RADIUS    = 18;
      var ENEMY_RADIUS   = 18;
      var BULLET_RADIUS  = 6;
      var HERO_SPEED     = Math.max(150, Math.min(400,  config.speed        || 220));
      // ── Grenade + Fog config ─────────────────────────────────────────────────
      var GRENADE_TYPE   = SC.grenadeType   || null;
      var GRENADE_COUNT  = (SC.grenadeCount !== undefined) ? SC.grenadeCount : 3;
      var GRENADE_CD     = Math.max(500, SC.grenadeCooldown || 3000);
      var FOG_OF_WAR     = SC.fogOfWar === true;
      var FOG_RADIUS     = Math.max(60, Math.min(300, SC.fogRadius || 180));
      // ── New building-block constants ─────────────────────────────────────────
      var HEALTH_PICKUPS   = SC.healthPickups  !== false;
      var GRENADE_PICKUPS  = !!(GRENADE_TYPE && SC.grenadePickups !== false);
      var WEAPON_PICKUPS   = SC.weaponPickups  === true;
      var ENEMY_GRENADES   = !!(GRENADE_TYPE && SC.enemyGrenades  === true);
      var ENEMY_GRENADE_CD = 5000; // ms between enemy grenade throws
      var ENEMY_TYPES      = (SC.enemyTypes && SC.enemyTypes.length) ? SC.enemyTypes : ['grunt'];
      var ETYPE_STATS = {
        grunt:  { hp: ENEMY_HP,       radius: 16, alertSpd: 95,  patrolMin: 55, patrolMax: 90,  scale: 1.0, tint: -1,       shootsBack: true,  frMult: 1.0 },
        heavy:  { hp: ENEMY_HP * 2,   radius: 20, alertSpd: 65,  patrolMin: 35, patrolMax: 50,  scale: 1.3, tint: 0xcc8844, shootsBack: true,  frMult: 1.5 },
        scout:  { hp: 1,              radius: 13, alertSpd: 140, patrolMin: 80, patrolMax: 110, scale: 0.8, tint: -1,       shootsBack: false, frMult: 1.0 },
        sniper: { hp: ENEMY_HP + 1,   radius: 16, alertSpd: 50,  patrolMin: 30, patrolMax: 50,  scale: 1.0, tint: 0x8888ff, shootsBack: true,  frMult: 0.5 },
      };

      class ShooterScene extends Phaser.Scene {
        constructor() { super({ key: 'ShooterScene' }); }

        preload() {
          if (config.heroSpriteUrl)  this.load.image('hero-spr',  config.heroSpriteUrl);
          else if (config.heroSpriteId)  this.load.image('hero-spr',  '/assets/characters/' + config.heroSpriteId  + '.svg');
          if (config.enemySpriteUrl) this.load.image('enemy-spr', config.enemySpriteUrl);
          else if (config.enemySpriteId) this.load.image('enemy-spr', '/assets/characters/' + config.enemySpriteId + '.svg');
          if (config.bgUrl)          this.load.image('bg-tile',   config.bgUrl);
          else if (config.bgId)          this.load.image('bg-tile',   '/assets/backgrounds/' + config.bgId         + '.svg');
        }

        create() {
          var W = this.cameras.main.width;
          var H = this.cameras.main.height;
          this.W = W; this.H = H;

          this.isGameOver           = false;
          this.score                = 0;
          this.heroHp               = HERO_HP;
          this.isInvincible         = false;
          this.lastShot             = 0;
          this.walls                = [];   // { x, y, w, h, obj }
          this.bullets              = [];   // { x, y, vx, vy, fromEnemy, obj }
          this.enemies              = [];   // { x, y, hp, maxHp, state, patrolZone, patrolDir, patrolAxis, patrolSpeed, shootTimer, lastFacingX, lastFacingY, blindedUntil, obj }
          this.grenades             = [];   // { x, y, vx, vy, fuse, obj, shadow, fromEnemy }
          this.smokeZones           = [];   // { x, y, r, until, obj }
          this.pickups              = [];   // { x, y, type, obj, labelObj, respawnAt }
          this.weaponPickupObjs     = [];   // { x, y, weaponId, obj, labelObj, respawnAt }
          this.grenadeAmmo          = (GRENADE_COUNT === 0) ? Infinity : GRENADE_COUNT;
          this.lastGrenade          = 0;
          this.slowUntil            = 0;
          this.heroDisorientedUntil = 0;
          this.currentWeapon        = 'pistol';
          this.currentFireRate      = FIRE_RATE;
          this.rampTimer            = 0;
          this.currentEnemyFireRate = ENEMY_FR_BASE;
          this.currentMaxEnemies    = MAX_ENEMIES;
          this.lastFacingX          = 1;
          this.lastFacingY          = 0;
          this.pointerDown          = false;
          this.tapStartTime         = 0;
          this.pointerTarget        = null;
          this.sounds               = createSounds();

          // ── Background ──────────────────────────────────────────────────────
          if ((config.bgId || config.bgUrl) && this.textures.exists('bg-tile')) {
            this.add.tileSprite(W/2, H/2, W, H, 'bg-tile').setOrigin(0.5).setDepth(-2);
          } else {
            this.cameras.main.setBackgroundColor(config.backgroundColor || '#2d4a2d');
            // Subtle checkerboard floor — alternating tiles +22 brightness
            var tileSize = 56;
            var floorG = this.add.graphics().setDepth(-1);
            var bgRaw = (config.backgroundColor || '#2d4a2d').replace('#','');
            while (bgRaw.length < 6) bgRaw = '0' + bgRaw;
            var fr=parseInt(bgRaw.slice(0,2),16), fgg=parseInt(bgRaw.slice(2,4),16), fbb=parseInt(bgRaw.slice(4,6),16);
            var fr2=Math.min(255,fr+22), fg2=Math.min(255,fgg+22), fb2=Math.min(255,fbb+22);
            var altColor=(fr2<<16)|(fg2<<8)|fb2;
            for (var ty=0; ty<H; ty+=tileSize) {
              for (var tx=0; tx<W; tx+=tileSize) {
                if ((Math.floor(tx/tileSize)+Math.floor(ty/tileSize))%2===0) {
                  floorG.fillStyle(altColor,1);
                  floorG.fillRect(tx,ty,tileSize,tileSize);
                }
              }
            }
          }
          // Arena border
          this.add.rectangle(W/2, H/2, W-8, H-8, 0xffffff, 0).setStrokeStyle(3, 0xffffff, 0.2).setDepth(0);

          // Derive wall color from backgroundColor (darker tint)
          var bgHex = (config.backgroundColor || '#2d4a2d').replace('#', '');
          while (bgHex.length < 6) bgHex = '0' + bgHex;
          var rr = Math.max(0, parseInt(bgHex.slice(0,2), 16) - 60);
          var gg = Math.max(0, parseInt(bgHex.slice(2,4), 16) - 60);
          var bb = Math.max(0, parseInt(bgHex.slice(4,6), 16) - 60);
          this.wallColor = (rr << 16) | (gg << 8) | bb;

          this.generateWalls();

          // ── Hero ────────────────────────────────────────────────────────────
          this.heroX = W/2; this.heroY = H/2;
          var useHeroSpr = config.heroSpriteId && this.textures.exists('hero-spr');
          if (useHeroSpr) {
            this.heroObj = this.add.image(this.heroX, this.heroY, 'hero-spr').setDisplaySize(44,44).setOrigin(0.5).setDepth(5);
          } else {
            this.heroObj = this.add.text(this.heroX, this.heroY, config.heroEmoji || '🧑', {
              fontSize: '44px', fontFamily: 'Arial'
            }).setOrigin(0.5).setDepth(5);
          }
          this.useHeroSpr  = useHeroSpr;
          this.useEnemySpr = config.enemySpriteId && this.textures.exists('enemy-spr');

          // ── Gun aim indicator (yellow dot, rendered above hero) ──────────────
          this.heroGunIndicator = this.add.graphics().setDepth(6);

          // ── HP HUD ───────────────────────────────────────────────────────────
          this.hpObjs = [];
          this.buildHpHUD();

          // ── Score + Title ────────────────────────────────────────────────────
          this.scoreTxt = this.add.text(W-20, 20, 'Score: 0', {
            fontSize: '24px', color: '#fff', stroke: '#000', strokeThickness: 4,
          }).setOrigin(1,0).setDepth(56);
          this.add.text(20, 20, config.title || 'Paintball!', {
            fontSize: '22px', color: '#fff', stroke: '#000', strokeThickness: 4,
          }).setDepth(56);
          // ── Grenade ammo HUD ─────────────────────────────────────────────────
          if (GRENADE_TYPE) {
            var grenadeIcon = { frag: '💣', smoke: '💨', flash: '🔆', slow: '⏱️' }[GRENADE_TYPE] || '💣';
            this.grenadeTxt = this.add.text(W/2, 20,
              grenadeIcon + ' ×' + (this.grenadeAmmo === Infinity ? '∞' : this.grenadeAmmo), {
              fontSize: '20px', color: '#fff', stroke: '#000', strokeThickness: 3,
            }).setOrigin(0.5, 0).setDepth(56);
          }

          // ── Spawn initial enemies by zone ─────────────────────────────────
          this.zones = this.buildZones();
          for (var zi = 0; zi < this.currentMaxEnemies; zi++) {
            this.spawnEnemy(this.zones[zi % this.zones.length]);
          }

          // ── Initial pickups + weapon drops ────────────────────────────────
          if (HEALTH_PICKUPS)  this.spawnInitialPickups('health',  3);
          if (GRENADE_PICKUPS) this.spawnInitialPickups('grenade', 2);
          if (WEAPON_PICKUPS)  this.spawnInitialWeapons();

          // ── Keyboard ─────────────────────────────────────────────────────────
          this.cursors    = this.input.keyboard.createCursorKeys();
          this.wasd       = this.input.keyboard.addKeys('W,A,S,D');
          this.spaceKey   = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
          this.grenadeKey = GRENADE_TYPE ? this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E) : null;

          // ── Pointer ───────────────────────────────────────────────────────────
          var self = this;
          this.input.on('pointerdown', function(ptr) {
            if (self.isGameOver) { self.scene.restart(); return; }
            self.pointerDown  = true;
            self.tapStartTime = self.time.now;
            self.pointerTarget = { x: ptr.x, y: ptr.y };
          });
          this.input.on('pointermove', function(ptr) {
            if (ptr.isDown) self.pointerTarget = { x: ptr.x, y: ptr.y };
          });
          this.input.on('pointerup', function(ptr) {
            self.pointerDown = false;
            var dur = self.time.now - self.tapStartTime;
            if (dur < 180) self.tryHeroShoot(ptr.x, ptr.y); // quick tap = shoot
            self.pointerTarget = null;
          });

          // ── Fog of war setup ─────────────────────────────────────────────────
          if (FOG_OF_WAR) {
            this.fogGraphics = this.add.graphics().setDepth(52);
            this.fogGraphics.fillStyle(0x000000, 0.88);
            this.fogGraphics.fillRect(0, 0, W, H);
            this.visionShape = this.make.graphics({ add: false });
            var fogMask = this.visionShape.createGeometryMask();
            fogMask.invertAlpha = true;
            this.fogGraphics.setMask(fogMask);
          }

          // ── Start hint ────────────────────────────────────────────────────────
          var hintStr = 'WASD/arrows move · SPACE/click shoot' + (GRENADE_TYPE ? ' · E throw' : '') + (WEAPON_PICKUPS ? ' · walk over weapons' : '') + ' · hold to move on mobile';
          var hint = this.add.text(W/2, H*0.92, hintStr, {
            fontSize: '15px', color: '#fff', stroke: '#000', strokeThickness: 3,
            backgroundColor: '#0009', padding: { x:10, y:5 },
          }).setOrigin(0.5).setDepth(56);
          this.time.delayedCall(3500, function(){ if (hint && hint.active) hint.setAlpha(0); });

          window.parent.postMessage({ type: 'GAME_READY' }, '*');
        }

        // ── Wall generation ─────────────────────────────────────────────────

        generateWalls() {
          var W = this.W, H = this.H;
          var clearR = 110;
          var margin  = 50;
          var placedCount = 0;
          var self = this;

          // Helper: place a random wall cluster at (wx, wy) using one of 3 types
          function placeCluster(wx, wy) {
            var rtype = Phaser.Math.Between(0, 2);
            if (rtype === 0) {
              var rw = Phaser.Math.Between(80, 130);
              self.addWall(wx - rw/2, wy - 10, rw, 20);
            } else if (rtype === 1) {
              var rh = Phaser.Math.Between(80, 130);
              self.addWall(wx - 10, wy - rh/2, 20, rh);
            } else {
              var aw = Phaser.Math.Between(60, 100);
              var bh = Phaser.Math.Between(50, 90);
              self.addWall(wx - aw/2, wy - 10, aw, 20);
              self.addWall(wx - 10,   wy + 10,  20, bh);
            }
          }

          // 1. Center T-shape anchor (always placed when WALL_COUNT >= 4)
          if (WALL_COUNT >= 4) {
            var hw = Phaser.Math.Between(90, 120);
            var vh = Phaser.Math.Between(50, 80);
            this.addWall(W/2 - hw/2, H/2 - 30, hw, 20); // horizontal bar
            this.addWall(W/2 - 10,   H/2 - 10,  20, vh); // vertical stem
            placedCount++;
          }

          // 2. One quadrant anchor per quadrant (when WALL_COUNT >= 8)
          if (WALL_COUNT >= 8) {
            var quadrants = [
              { x: margin + 10,  y: margin + 10,  w: W/2 - margin - 30, h: H/2 - margin - 30 }, // TL
              { x: W/2 + 20,     y: margin + 10,  w: W/2 - margin - 30, h: H/2 - margin - 30 }, // TR
              { x: margin + 10,  y: H/2 + 20,     w: W/2 - margin - 30, h: H/2 - margin - 30 }, // BL
              { x: W/2 + 20,     y: H/2 + 20,     w: W/2 - margin - 30, h: H/2 - margin - 30 }, // BR
            ];
            for (var q = 0; q < quadrants.length && placedCount < WALL_COUNT; q++) {
              var qz = quadrants[q];
              var qx = Phaser.Math.Between(qz.x + 20, qz.x + qz.w - 20);
              var qy = Phaser.Math.Between(qz.y + 20, qz.y + qz.h - 20);
              placeCluster(qx, qy);
              placedCount++;
            }
          }

          // 3. Random fill for remaining slots
          var remaining = WALL_COUNT - placedCount;
          for (var i = 0; i < remaining; i++) {
            var found = false;
            for (var attempt = 0; attempt < 40 && !found; attempt++) {
              var wx = Phaser.Math.Between(margin, W - margin);
              var wy = Phaser.Math.Between(margin, H - margin);
              if (Math.sqrt((wx-W/2)*(wx-W/2)+(wy-H/2)*(wy-H/2)) < clearR) continue;
              placeCluster(wx, wy);
              found = true;
            }
          }
        }

        addWall(x, y, w, h) {
          var obj = this.add.rectangle(x + w/2, y + h/2, w, h, this.wallColor).setDepth(3);
          obj.setStrokeStyle(1, 0xffffff, 0.08);
          this.walls.push({ x: x, y: y, w: w, h: h, obj: obj });
        }

        // ── Wall collision resolution ─────────────────────────────────────────
        // Push circle (cx, cy, r) out of any overlapping wall rectangles.

        resolveWallCollision(cx, cy, r) {
          for (var i = 0; i < this.walls.length; i++) {
            var wall = this.walls[i];
            var nearX  = Math.max(wall.x, Math.min(wall.x + wall.w, cx));
            var nearY  = Math.max(wall.y, Math.min(wall.y + wall.h, cy));
            var dx     = cx - nearX;
            var dy     = cy - nearY;
            var distSq = dx*dx + dy*dy;
            if (distSq > 0 && distSq < r*r) {
              var dist = Math.sqrt(distSq);
              cx += (dx/dist) * (r - dist);
              cy += (dy/dist) * (r - dist);
            } else if (distSq === 0) {
              cy -= r; // exact center on edge — push up
            }
          }
          cx = Math.max(r, Math.min(this.W - r, cx));
          cy = Math.max(r, Math.min(this.H - r, cy));
          return { x: cx, y: cy };
        }

        // ── Line-of-sight (parametric segment–AABB slab test) ────────────────
        // Returns TRUE if the segment (x1,y1)→(x2,y2) is unobstructed.

        hasLOS(x1, y1, x2, y2) {
          var dx = x2 - x1, dy = y2 - y1;
          // Wall slab test
          for (var i = 0; i < this.walls.length; i++) {
            var w  = this.walls[i];
            var wL = w.x, wR = w.x + w.w, wT = w.y, wB = w.y + w.h;
            var tMin = 0, tMax = 1;
            // X slab
            if (Math.abs(dx) < 0.0001) {
              if (x1 < wL || x1 > wR) continue;
            } else {
              var tx1 = (wL - x1) / dx, tx2 = (wR - x1) / dx;
              if (tx1 > tx2) { var tmp = tx1; tx1 = tx2; tx2 = tmp; }
              tMin = Math.max(tMin, tx1); tMax = Math.min(tMax, tx2);
              if (tMin > tMax) continue;
            }
            // Y slab
            if (Math.abs(dy) < 0.0001) {
              if (y1 < wT || y1 > wB) continue;
            } else {
              var ty1 = (wT - y1) / dy, ty2 = (wB - y1) / dy;
              if (ty1 > ty2) { var tmp2 = ty1; ty1 = ty2; ty2 = tmp2; }
              tMin = Math.max(tMin, ty1); tMax = Math.min(tMax, ty2);
              if (tMin > tMax) continue;
            }
            return false; // blocked by wall
          }
          // Smoke zones block LOS — segment vs circle (point-to-line distance)
          var now = this.time.now;
          var lenSq = dx*dx + dy*dy;
          for (var si = 0; si < this.smokeZones.length; si++) {
            var sz = this.smokeZones[si];
            if (sz.until < now) continue;
            if (lenSq < 0.001) continue;
            var t = Math.max(0, Math.min(1, ((sz.x - x1)*dx + (sz.y - y1)*dy) / lenSq));
            var closestX = x1 + t*dx, closestY = y1 + t*dy;
            var distSq = (sz.x - closestX)*(sz.x - closestX) + (sz.y - closestY)*(sz.y - closestY);
            if (distSq < sz.r * sz.r) return false; // blocked by smoke
          }
          return true; // clear
        }

        // ── Projectile system ───────────────────────────────────────────────

        spawnBullet(x, y, vx, vy, fromEnemy, damage) {
          // Offset spawn forward so bullet starts outside the shooter's body
          var len = Math.sqrt(vx*vx + vy*vy);
          if (len > 0) {
            var offset = (fromEnemy ? ENEMY_RADIUS : HERO_RADIUS) + BULLET_RADIUS + 2;
            x += (vx/len) * offset;
            y += (vy/len) * offset;
          }
          x = Math.max(BULLET_RADIUS, Math.min(this.W - BULLET_RADIUS, x));
          y = Math.max(BULLET_RADIUS, Math.min(this.H - BULLET_RADIUS, y));
          var color = fromEnemy ? 0xff4433 : 0x33aaff;
          var obj = this.add.circle(x, y, BULLET_RADIUS, color).setDepth(8);
          this.bullets.push({ x: x, y: y, vx: vx, vy: vy, fromEnemy: fromEnemy, damage: damage || 1, obj: obj });
        }

        updateBullets(dt) {
          var W = this.W, H = this.H;
          for (var i = this.bullets.length - 1; i >= 0; i--) {
            var b = this.bullets[i];
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            b.obj.setPosition(b.x, b.y);

            // Off-screen
            if (b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) {
              b.obj.destroy(); this.bullets.splice(i, 1); continue;
            }

            // Wall hit
            var hitWall = false;
            for (var wi = 0; wi < this.walls.length; wi++) {
              var w = this.walls[wi];
              if (b.x > w.x && b.x < w.x+w.w && b.y > w.y && b.y < w.y+w.h) {
                hitWall = true; break;
              }
            }
            if (hitWall) {
              this.splatEffect(b.x, b.y, b.fromEnemy ? 0xff4433 : 0x33aaff);
              b.obj.destroy(); this.bullets.splice(i, 1); continue;
            }

            // Hero hit (enemy bullets only)
            if (b.fromEnemy && !this.isInvincible) {
              var hdx = b.x - this.heroX, hdy = b.y - this.heroY;
              var hr = HERO_RADIUS + BULLET_RADIUS;
              if (hdx*hdx + hdy*hdy < hr*hr) {
                this.splatEffect(b.x, b.y, 0xff4433);
                b.obj.destroy(); this.bullets.splice(i, 1);
                this.heroTakeHit();
                if (this.isGameOver) return;
                continue;
              }
            }

            // Enemy hit (hero bullets only)
            if (!b.fromEnemy) {
              var hit = false;
              for (var ei = this.enemies.length - 1; ei >= 0; ei--) {
                var e = this.enemies[ei];
                var edx = b.x - e.x, edy = b.y - e.y;
                var er = (e.radius || ENEMY_RADIUS) + BULLET_RADIUS;
                if (edx*edx + edy*edy < er*er) {
                  this.splatEffect(b.x, b.y, 0x44ff88);
                  b.obj.destroy(); this.bullets.splice(i, 1);
                  this.enemyTakeHit(e, b.damage);
                  hit = true; break;
                }
              }
              if (hit) continue;
            }
          }
        }

        splatEffect(x, y, color) {
          var dot = this.add.circle(x, y, BULLET_RADIUS * 2.5, color, 0.8).setDepth(9);
          this.tweens.add({
            targets: dot, scaleX: 3, scaleY: 3, alpha: 0,
            duration: 320, ease: 'Power2',
            onComplete: function() { if (dot.active) dot.destroy(); }
          });
        }

        // ── Grenade system ──────────────────────────────────────────────────

        spawnGrenade(tx, ty) {
          var now = this.time.now;
          if (now - this.lastGrenade < GRENADE_CD) return;
          if (this.grenadeAmmo !== Infinity && this.grenadeAmmo <= 0) return;
          this.lastGrenade = now;
          if (this.grenadeAmmo !== Infinity) {
            this.grenadeAmmo--;
            if (this.grenadeTxt) {
              var gi = { frag: '💣', smoke: '💨', flash: '🔆', slow: '⏱️' }[GRENADE_TYPE] || '💣';
              this.grenadeTxt.setText(gi + ' ×' + this.grenadeAmmo);
            }
          }
          var dx = tx - this.heroX, dy = ty - this.heroY;
          var len = Math.sqrt(dx*dx + dy*dy);
          var spd = 320;
          var vx = len > 1 ? (dx/len)*spd : this.lastFacingX*spd;
          var vy = len > 1 ? (dy/len)*spd : this.lastFacingY*spd;
          var obj    = this.add.circle(this.heroX, this.heroY, 7, 0x886600).setDepth(9);
          var shadow = this.add.circle(this.heroX, this.heroY + 10, 5, 0x000000, 0.35).setDepth(6);
          this.grenades.push({ x: this.heroX, y: this.heroY, vx: vx, vy: vy,
            fuse: 1600, fuseMax: 1600, obj: obj, shadow: shadow });
        }

        updateGrenades(dt) {
          var now = this.time.now;
          for (var i = this.grenades.length - 1; i >= 0; i--) {
            var g = this.grenades[i];
            g.x += g.vx * dt;
            g.y += g.vy * dt;
            // Soft-bounce off canvas edges
            if (g.x < 12) { g.vx = Math.abs(g.vx)*0.6; g.x = 12; }
            if (g.x > this.W-12) { g.vx = -Math.abs(g.vx)*0.6; g.x = this.W-12; }
            if (g.y < 12) { g.vy = Math.abs(g.vy)*0.6; g.y = 12; }
            if (g.y > this.H-12) { g.vy = -Math.abs(g.vy)*0.6; g.y = this.H-12; }
            // Parabolic arc visual: bob above real y, grow shadow on "landing"
            var progress = 1 - (g.fuse / g.fuseMax);
            var arc = Math.sin(progress * Math.PI) * -18; // negative = up on screen
            g.obj.setPosition(g.x, g.y + arc);
            g.shadow.setPosition(g.x, g.y + 8);
            g.shadow.setScale(0.4 + progress * 1.4);
            // Count down fuse
            g.fuse -= dt * 1000;
            if (g.fuse <= 0) {
              g.obj.destroy(); g.shadow.destroy();
              this.grenades.splice(i, 1);
              this.detonateGrenade(g);
            }
          }
          // Expire smoke zones
          for (var si = this.smokeZones.length - 1; si >= 0; si--) {
            var sz = this.smokeZones[si];
            if (now > sz.until) {
              var szObj = sz.obj;
              this.tweens.add({ targets: szObj, alpha: 0, duration: 1200,
                onComplete: function() { if (szObj.active) szObj.destroy(); } });
              this.smokeZones.splice(si, 1);
            }
          }
        }

        detonateGrenade(g) {
          var fe = g.fromEnemy || false;
          if (GRENADE_TYPE === 'frag')  this.detonateFrag(g.x, g.y, fe);
          else if (GRENADE_TYPE === 'smoke') this.detonateSmoke(g.x, g.y);
          else if (GRENADE_TYPE === 'flash') this.detonateFlash(g.x, g.y, fe);
          else if (GRENADE_TYPE === 'slow')  this.detonateSlow(g.x, g.y);
        }

        detonateFrag(x, y, fromEnemy) {
          var BLAST = 90;
          // Expanding ring flash
          var ring = this.add.circle(x, y, 10, 0xff8800, 0.9).setDepth(20);
          this.tweens.add({ targets: ring, scaleX: BLAST/5, scaleY: BLAST/5, alpha: 0,
            duration: 420, ease: 'Power2',
            onComplete: function() { if (ring.active) ring.destroy(); } });
          var hDx = this.heroX - x, hDy = this.heroY - y;
          if (!fromEnemy) {
            // Hero-thrown frag: damage enemies in blast radius
            var self = this;
            for (var i = this.enemies.length - 1; i >= 0; i--) {
              var e = this.enemies[i];
              var ex = e.x - x, ey = e.y - y;
              if (ex*ex + ey*ey < BLAST*BLAST) {
                e.hp -= 2;
                this.splatEffect(e.x, e.y, 0xff8800);
                if (e.hp <= 0) {
                  var zone = e.patrolZone;
                  if (e.hpBar) e.hpBar.destroy();
                  e.obj.destroy();
                  this.enemies.splice(i, 1);
                  this.score++;
                  this.scoreTxt.setText('Score: ' + this.score);
                  (function(z) { self.time.delayedCall(3000, function() {
                    if (!self.isGameOver) self.spawnEnemy(z); }); })(zone);
                }
              }
            }
            // Self-damage: hero too close to own blast (inner 55% of radius)
            var selfBlast = BLAST * 0.55;
            if (hDx*hDx + hDy*hDy < selfBlast*selfBlast && !this.isInvincible) {
              this.heroTakeHit();
            }
          } else {
            // Enemy-thrown frag: damage hero if in range
            if (hDx*hDx + hDy*hDy < BLAST*BLAST && !this.isInvincible) {
              this.heroTakeHit();
            }
          }
        }

        detonateSmoke(x, y) {
          var SR = 80, DUR = 8000;
          var obj = this.add.circle(x, y, SR, 0x999999, 0.50).setDepth(11);
          this.smokeZones.push({ x: x, y: y, r: SR, until: this.time.now + DUR, obj: obj });
        }

        detonateFlash(x, y, fromEnemy) {
          var FR = 200;
          var now = this.time.now;
          // White screen flash (visual for everyone)
          var flash = this.add.rectangle(this.W/2, this.H/2, this.W, this.H, 0xffffff, 0.95).setDepth(100);
          this.tweens.add({ targets: flash, alpha: 0, duration: 1500, ease: 'Power2',
            onComplete: function() { if (flash.active) flash.destroy(); } });
          // Hero disorientation (if hero is in range)
          var hDx = this.heroX - x, hDy = this.heroY - y;
          if (hDx*hDx + hDy*hDy < FR*FR) {
            this.heroDisorientedUntil = now + 1500;
            var yFlash = this.add.rectangle(this.W/2, this.H/2, this.W, this.H, 0xffee00, 0.20).setDepth(53);
            this.tweens.add({ targets: yFlash, alpha: 0, delay: 700, duration: 800,
              onComplete: function() { if (yFlash.active) yFlash.destroy(); } });
          }
          // Blind nearby enemies
          for (var i = 0; i < this.enemies.length; i++) {
            var e = this.enemies[i];
            var ex = e.x - x, ey = e.y - y;
            if (ex*ex + ey*ey < FR*FR) {
              e.blindedUntil = now + 3000;
              var ba = Math.random() * Math.PI * 2;
              e.lastFacingX = Math.cos(ba); e.lastFacingY = Math.sin(ba);
              e.state = 'patrol';
            }
          }
        }

        detonateSlow(x, y) {
          this.slowUntil = this.time.now + 4000;
          var overlay = this.add.rectangle(this.W/2, this.H/2, this.W, this.H, 0x2244ff, 0.18).setDepth(51);
          this.tweens.add({ targets: overlay, alpha: 0, delay: 3000, duration: 1000,
            onComplete: function() { if (overlay.active) overlay.destroy(); } });
        }

        updateFog() {
          this.visionShape.clear();
          this.visionShape.fillStyle(0xffffff);
          this.visionShape.fillCircle(this.heroX, this.heroY, FOG_RADIUS);
        }

        // ── Hero actions ────────────────────────────────────────────────────

        tryHeroShoot(targetX, targetY) {
          var now = this.time.now;
          if (now - this.lastShot < this.currentFireRate) return;
          this.lastShot = now;
          var dx = targetX - this.heroX, dy = targetY - this.heroY;
          var len = Math.sqrt(dx*dx + dy*dy);
          if (len < 1) { dx = this.lastFacingX; dy = this.lastFacingY; len = 1; }
          this.lastFacingX = dx/len; this.lastFacingY = dy/len;
          var nx = dx/len, ny = dy/len;
          if (this.currentWeapon === 'shotgun') {
            var baseAngle = Math.atan2(ny, nx);
            var spread = [-0.34, -0.17, 0, 0.17, 0.34];
            for (var si = 0; si < spread.length; si++) {
              var a = baseAngle + spread[si];
              this.spawnBullet(this.heroX, this.heroY, Math.cos(a)*PROJ_SPEED*0.9, Math.sin(a)*PROJ_SPEED*0.9, false, 1);
            }
          } else if (this.currentWeapon === 'sniper') {
            this.spawnBullet(this.heroX, this.heroY, nx*PROJ_SPEED*1.8, ny*PROJ_SPEED*1.8, false, 3);
          } else {
            this.spawnBullet(this.heroX, this.heroY, nx*PROJ_SPEED, ny*PROJ_SPEED, false, 1);
          }
          this.sounds.shoot && this.sounds.shoot();
        }

        heroTakeHit() {
          this.heroHp = Math.max(0, this.heroHp - 1);
          this.buildHpHUD();
          this.sounds.hit && this.sounds.hit();
          if (this.heroHp <= 0) { this.triggerGameOver(); return; }
          this.isInvincible = true;
          var hero = this.heroObj;
          this.tweens.add({
            targets: hero, alpha: 0.2, duration: 100, yoyo: true, repeat: 6,
            onComplete: function() { if (hero.active) hero.setAlpha(1); }
          });
          var self = this;
          this.time.delayedCall(1200, function() { self.isInvincible = false; });
        }

        buildHpHUD() {
          if (this.hpObjs) this.hpObjs.forEach(function(h) { if (h.active) h.destroy(); });
          this.hpObjs = [];
          for (var i = 0; i < HERO_HP; i++) {
            var h = this.add.text(16 + i*28, 52, i < this.heroHp ? '❤️' : '🖤', {
              fontSize: '20px', fontFamily: 'Arial'
            }).setDepth(56);
            this.hpObjs.push(h);
          }
        }

        // ── Enemy system ────────────────────────────────────────────────────

        buildZones() {
          var W = this.W, H = this.H;
          var cx = W/2, cy = H/2;
          return [
            { x: 20,    y: 20,    w: cx-40, h: cy-40 }, // top-left
            { x: cx+20, y: 20,    w: cx-40, h: cy-40 }, // top-right
            { x: 20,    y: cy+20, w: cx-40, h: cy-40 }, // bottom-left
            { x: cx+20, y: cy+20, w: cx-40, h: cy-40 }, // bottom-right
          ];
        }

        isPositionInWall(cx, cy, r) {
          for (var i = 0; i < this.walls.length; i++) {
            var w = this.walls[i];
            var nx = Math.max(w.x, Math.min(w.x+w.w, cx));
            var ny = Math.max(w.y, Math.min(w.y+w.h, cy));
            var dx = cx-nx, dy = cy-ny;
            if (dx*dx + dy*dy < r*r) return true;
          }
          return false;
        }

        spawnEnemy(zone) {
          var eType = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
          var stats  = ETYPE_STATS[eType] || ETYPE_STATS.grunt;
          var x, y, attempts = 0;
          do {
            x = Phaser.Math.Between(zone.x + 30, Math.max(zone.x + 35, zone.x + zone.w - 30));
            y = Phaser.Math.Between(zone.y + 30, Math.max(zone.y + 35, zone.y + zone.h - 30));
            attempts++;
          } while (attempts < 20 && this.isPositionInWall(x, y, stats.radius));

          var obj;
          if (this.useEnemySpr) {
            obj = this.add.image(x, y, 'enemy-spr').setDisplaySize(44,44).setOrigin(0.5).setDepth(4);
          } else {
            obj = this.add.text(x, y, config.enemyEmoji || '🎭', {
              fontSize: '44px', fontFamily: 'Arial'
            }).setOrigin(0.5).setDepth(4);
          }
          if (stats.scale !== 1.0) obj.setScale(stats.scale);
          if (stats.tint !== -1)   obj.setTint(stats.tint);

          var axis = Math.random() < 0.5 ? 'x' : 'y';
          var initAngle = Math.random() * Math.PI * 2;
          var hpBar = this.add.graphics().setDepth(12);
          this.enemies.push({
            x: x, y: y,
            hp: stats.hp, maxHp: stats.hp,
            eType: eType,
            radius: stats.radius,
            state: 'patrol',
            patrolZone: zone,
            patrolDir: 1,
            patrolAxis: axis,
            patrolSpeed: Phaser.Math.Between(stats.patrolMin, stats.patrolMax),
            alertSpeed: stats.alertSpd,
            shootsBack: stats.shootsBack,
            frMult: stats.frMult,
            shootTimer: 0,
            grenadeTimer: 0,
            lastFacingX: Math.cos(initAngle),
            lastFacingY: Math.sin(initAngle),
            blindedUntil: 0,
            hpBar: hpBar,
            obj: obj,
          });
        }

        enemyTakeHit(e, dmg) {
          e.hp -= (dmg || 1);
          if (e.hp <= 0) {
            var obj = e.obj;
            if (e.hpBar && e.hpBar.active) e.hpBar.destroy();
            this.tweens.add({
              targets: obj, alpha: 0, scaleX: 1.8, scaleY: 1.8,
              duration: 250, ease: 'Power2',
              onComplete: function() { if (obj.active) obj.destroy(); }
            });
            this.enemies.splice(this.enemies.indexOf(e), 1);
            this.score++;
            this.scoreTxt.setText('Score: ' + this.score);
            this.sounds.score && this.sounds.score();
            // Respawn in same zone after 3s
            var self = this;
            var zone = e.patrolZone;
            this.time.delayedCall(3000, function() {
              if (!self.isGameOver) self.spawnEnemy(zone);
            });
          } else {
            // Flash and seek cover
            e.state = 'cover';
            var obj2 = e.obj;
            this.tweens.add({
              targets: obj2, alpha: 0.3, duration: 80, yoyo: true, repeat: 2,
              onComplete: function() { if (obj2.active) obj2.setAlpha(1); }
            });
          }
        }

        // ── Enemy AI state machine ──────────────────────────────────────────

        updateEnemy(e, dt) {
          // Flashbang: blinded enemies wander randomly, ignore hero
          if (e.blindedUntil && this.time.now < e.blindedUntil) {
            e.x += e.lastFacingX * 55 * dt;
            e.y += e.lastFacingY * 55 * dt;
            var br = this.resolveWallCollision(e.x, e.y, e.radius || ENEMY_RADIUS);
            e.x = br.x; e.y = br.y;
            e.obj.setPosition(e.x, e.y);
            if (Math.random() < 0.02) {
              var ba = Math.random() * Math.PI * 2;
              e.lastFacingX = Math.cos(ba); e.lastFacingY = Math.sin(ba);
            }
            return;
          }

          var hx = this.heroX, hy = this.heroY;
          var dx = hx - e.x, dy = hy - e.y;
          var dist = Math.sqrt(dx*dx + dy*dy);
          var los  = this.hasLOS(e.x, e.y, hx, hy);

          var er = e.radius || ENEMY_RADIUS;

          if (e.state === 'patrol') {
            var spd = e.patrolSpeed;
            if (e.patrolAxis === 'x') {
              e.x += e.patrolDir * spd * dt;
              if (e.x > e.patrolZone.x + e.patrolZone.w - 20) e.patrolDir = -1;
              if (e.x < e.patrolZone.x + 20)                  e.patrolDir =  1;
            } else {
              e.y += e.patrolDir * spd * dt;
              if (e.y > e.patrolZone.y + e.patrolZone.h - 20) e.patrolDir = -1;
              if (e.y < e.patrolZone.y + 20)                  e.patrolDir =  1;
            }
            var patRes = this.resolveWallCollision(e.x, e.y, er);
            e.x = patRes.x; e.y = patRes.y;
            if (los && dist < 280) e.state = 'alert';

          } else if (e.state === 'alert') {
            if (dist > 0) {
              var nx = e.x + (dx/dist) * (e.alertSpeed || 95) * dt;
              var ny = e.y + (dy/dist) * (e.alertSpeed || 95) * dt;
              var res = this.resolveWallCollision(nx, ny, er);
              e.x = res.x; e.y = res.y;
            }
            if (dist < 150 && los) { e.state = 'shoot'; e.shootTimer = 0; }
            if (dist > 380 || !los) e.state = 'patrol';

          } else if (e.state === 'shoot') {
            var eFireRate = this.currentEnemyFireRate * (e.frMult || 1.0);
            if (e.shootsBack !== false) {
              e.shootTimer += dt * 1000;
              if (e.shootTimer >= eFireRate) {
                e.shootTimer = 0;
                if (dist > 0) {
                  this.spawnBullet(e.x, e.y, (dx/dist)*PROJ_SPEED, (dy/dist)*PROJ_SPEED, true);
                }
              }
            }
            // Enemy grenade throw
            if (ENEMY_GRENADES && dist > 0) {
              e.grenadeTimer = (e.grenadeTimer || 0) + dt * 1000;
              if (e.grenadeTimer >= ENEMY_GRENADE_CD) {
                e.grenadeTimer = 0;
                this.spawnEnemyGrenade(e);
              }
            }
            // Scouts can't enter shoot state — fall back to alert
            if (e.shootsBack === false) { e.state = 'alert'; }
            if (!los || dist > 240) e.state = 'alert';
            // Occasionally seek cover when damaged
            if (e.hp < e.maxHp && Math.random() < 0.008) e.state = 'cover';

          } else if (e.state === 'cover') {
            var target = this.findCoverPoint(e);
            if (target) {
              var tdx = target.x - e.x, tdy = target.y - e.y;
              var tdist = Math.sqrt(tdx*tdx + tdy*tdy);
              if (tdist < 12) {
                e.state = 'patrol';
              } else {
                var nx2 = e.x + (tdx/tdist) * 110 * dt;
                var ny2 = e.y + (tdy/tdist) * 110 * dt;
                var res2 = this.resolveWallCollision(nx2, ny2, er);
                e.x = res2.x; e.y = res2.y;
              }
            } else {
              e.state = 'patrol';
            }
          }

          e.x = Math.max(er, Math.min(this.W - er, e.x));
          e.y = Math.max(er, Math.min(this.H - er, e.y));
          e.obj.setPosition(e.x, e.y);

          // Draw HP bar (only when damaged)
          if (e.hpBar) {
            e.hpBar.clear();
            if (e.hp < e.maxHp) {
              var barW = er * 2 + 6, barH = 4;
              var bary = e.y - er - 9;
              e.hpBar.fillStyle(0x222222, 0.8);
              e.hpBar.fillRect(e.x - barW/2, bary, barW, barH);
              var ratio = e.hp / e.maxHp;
              var col = ratio > 0.6 ? 0x44dd44 : ratio > 0.3 ? 0xdddd22 : 0xdd2222;
              e.hpBar.fillStyle(col, 1);
              e.hpBar.fillRect(e.x - barW/2, bary, barW * ratio, barH);
            }
          }
        }

        findCoverPoint(e) {
          var hx = this.heroX, hy = this.heroY;
          var best = null, bestDist = Infinity;
          for (var i = 0; i < this.walls.length; i++) {
            var w = this.walls[i];
            var er2 = e.radius || ENEMY_RADIUS;
            var pts = [
              { x: w.x + w.w/2, y: w.y - er2 - 5 },
              { x: w.x + w.w/2, y: w.y + w.h + er2 + 5 },
              { x: w.x - er2 - 5, y: w.y + w.h/2 },
              { x: w.x + w.w + er2 + 5, y: w.y + w.h/2 },
            ];
            for (var pi = 0; pi < pts.length; pi++) {
              var pt = pts[pi];
              // Prefer positions the hero can't see
              if (!this.hasLOS(hx, hy, pt.x, pt.y)) {
                var d = (pt.x-e.x)*(pt.x-e.x) + (pt.y-e.y)*(pt.y-e.y);
                if (d < bestDist) { bestDist = d; best = pt; }
              }
            }
          }
          // Fallback: nearest wall centroid
          if (!best && this.walls.length > 0) {
            for (var j = 0; j < this.walls.length; j++) {
              var w2 = this.walls[j];
              var cx = w2.x + w2.w/2, cy = w2.y + w2.h/2;
              var d2 = (cx-e.x)*(cx-e.x) + (cy-e.y)*(cy-e.y);
              if (d2 < bestDist) { bestDist = d2; best = { x: cx, y: cy }; }
            }
          }
          return best;
        }

        // ── Pickup system ────────────────────────────────────────────────────

        randomPickupPos(margin) {
          var W = this.W, H = this.H;
          margin = margin || 40;
          for (var attempts = 0; attempts < 50; attempts++) {
            var x = Phaser.Math.Between(margin, W - margin);
            var y = Phaser.Math.Between(margin, H - margin);
            var dx = x - W/2, dy = y - H/2;
            if (dx*dx + dy*dy < 80*80) continue; // avoid center spawn
            if (!this.isPositionInWall(x, y, 18)) return { x: x, y: y };
          }
          return { x: Phaser.Math.Between(margin, W - margin), y: Phaser.Math.Between(margin, H - margin) };
        }

        spawnInitialPickups(type, count) {
          for (var i = 0; i < count; i++) {
            var pos = this.randomPickupPos(40);
            this.spawnPickup(type, pos.x, pos.y);
          }
        }

        spawnPickup(type, x, y) {
          var color  = type === 'health' ? 0x33cc44 : 0xddaa11;
          var emoji  = type === 'health' ? '❤️' : '📦';
          var circle = this.add.circle(x, y, 12, color, 0.85).setDepth(7);
